appendonly yes
appendfsync everysec

# Disable the default unauthenticated user; use the admin user instead
user default off
user admin on >pass123 ~* &* +@all

# No global key TTL exists in Redis — your app must set EXPIRE 1200 (20 min) per key.
# LRU eviction kicks in if maxmemory is ever hit.
maxmemory-policy allkeys-lru
